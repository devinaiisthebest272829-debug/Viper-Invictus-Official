<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viper Invictus IDE</title>
  <script type="text/javascript">
    // Single Page App routing fix for GitHub Pages
    var path = window.location.pathname;
    var repo = '/Viper-Invictus-Official';
    if (path.startsWith(repo)) {
      path = path.substring(repo.length);
    }
    if (path !== '/' && path !== '') {
      window.location.replace(repo + '/#' + path);
    } else {
      window.location.replace(repo + '/');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
