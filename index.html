      /* Hide Replit badge */
      .replit-badge, .repl-badge, [class*="replit"], [class*="repl-badge"],
      div[style*="position: fixed"][style*="bottom"], div[style*="position:fixed"][style*="bottom"] {
        display: none !important;

        opacity: 0 !important;
        pointer-events: none !important;
      }

  </head>
  <body>
    <div id="root"></div>
    <script>
      // Remove Replit badge if injected
      function removeReplitBadge() {
        const selectors = [
          '.replit-badge',
          '.repl-badge',
          '[class*="replit"]',
          'div[style*="position: fixed"]',
          'div[style*="position:fixed"]',
          'iframe[src*="replit"]'
        ];
        selectors.forEach(sel => {
          document.querySelectorAll(sel).forEach(el => {
            if (el.textContent?.toLowerCase().includes('replit') || el.innerHTML?.toLowerCase().includes('replit')) {
              el.style.display = 'none';
              el.style.visibility = 'hidden';
              el.style.opacity = '0';
              el.style.pointerEvents = 'none';
            }
          });
        });
      }
      setInterval(removeReplitBadge, 500);
      removeReplitBadge();
    </script>
  </body>
